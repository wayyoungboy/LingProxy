<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingProxy 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: #1890ff; color: white; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { text-align: center; padding: 2rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #1890ff; margin-bottom: 0.5rem; }
        .stat-label { color: #666; }
        .nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .nav a { padding: 0.5rem 1rem; background: #1890ff; color: white; text-decoration: none; border-radius: 4px; }
        .nav a:hover { background: #40a9ff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 600; }
        .loading { text-align: center; padding: 2rem; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>LingProxy 管理后台</h1>
        <p>AI API网关管理系统</p>
    </div>

    <div class="container">
        <div class="nav">
            <a href="#dashboard">仪表盘</a>
            <a href="#users">用户管理</a>
            <a href="#providers">提供商管理</a>
            <a href="#requests">请求记录</a>
            <a href="#stats">统计分析</a>
        </div>

        <div class="stats">
            <div class="card stat-card">
                <div class="stat-value" id="total-users">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="total-providers">0</div>
                <div class="stat-label">提供商数量</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="total-requests">0</div>
                <div class="stat-label">总请求数</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" id="success-rate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>

        <div class="card">
            <h2>最近请求</h2>
            <table id="requests-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>用户</th>
                        <th>提供商</th>
                        <th>状态</th>
                        <th>耗时</th>
                    </tr>
                </thead>
                <tbody id="requests-tbody">
                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 简单的数据加载
        async function loadData() {
            try {
                // 模拟数据
                document.getElementById('total-users').textContent = '156';
                document.getElementById('total-providers').textContent = '8';
                document.getElementById('total-requests').textContent = '12,345';
                document.getElementById('success-rate').textContent = '98.5%';

                // 模拟请求数据
                const requests = [
                    { time: '2024-01-29 16:30:00', user: 'admin', provider: 'OpenAI', status: '成功', duration: '120ms' },
                    { time: '2024-01-29 16:29:45', user: 'user1', provider: 'Claude', status: '成功', duration: '200ms' },
                    { time: '2024-01-29 16:29:30', user: 'user2', provider: 'Gemini', status: '成功', duration: '150ms' }
                ];

                const tbody = document.getElementById('requests-tbody');
                tbody.innerHTML = requests.map(req => `
                    <tr>
                        <td>${req.time}</td>
                        <td>${req.user}</td>
                        <td>${req.provider}</td>
                        <td><span style="color: green;">${req.status}</span></td>
                        <td>${req.duration}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
