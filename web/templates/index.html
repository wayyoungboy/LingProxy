<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingProxy 管理后台</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <img src="/static/images/logo/lingproxy-logo.svg" alt="LingProxy Logo" class="logo">
        </div>
        <h1>LingProxy 管理后台</h1>
        <p>AI API网关管理系统</p>
    </div>
    
    <div class="container">
        <!-- 导航菜单 -->
        <div class="nav">
            <button class="nav-btn active" onclick="showSection('dashboard')">仪表盘</button>
            <button class="nav-btn" onclick="showSection('users')">用户管理</button>
            <button class="nav-btn" onclick="showSection('llm-resources')">LLM资源管理</button>
            <button class="nav-btn" onclick="showSection('requests')">请求记录</button>
            <button class="nav-btn" onclick="showSection('settings')">系统设置</button>
        </div>

        <!-- 仪表盘 -->
        <div id="dashboard" class="section active">
            <h2>仪表盘</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">总用户数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalLLMResources">0</div>
                    <div class="stat-label">LLM资源数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalRequests">0</div>
                    <div class="stat-label">总请求数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="successRate">0%</div>
                    <div class="stat-label">成功率</div>
                </div>
            </div>
            
            <div class="card">
                <h3>最近请求</h3>
                <div id="recentRequests">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 用户管理 -->
        <div id="users" class="section">
            <h2>用户管理</h2>
            <div class="toolbar">
                <button class="btn primary" onclick="addUser()">添加用户</button>
                <button class="btn" onclick="refreshUsers()">刷新</button>
            </div>
            <div class="table-container">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="6" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- LLM资源管理 -->
        <div id="llm-resources" class="section">
            <h2>LLM资源管理</h2>
            <div class="toolbar">
                <button class="btn primary" onclick="addLLMResource()">添加LLM资源</button>
                <button class="btn" onclick="refreshLLMResources()">刷新</button>
            </div>
            <div class="table-container">
                <table id="llmResourcesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>类型</th>
                            <th>模型</th>
                            <th>API密钥</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="llmResourcesTableBody">
                        <tr><td colspan="8" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 请求记录 -->
        <div id="requests" class="section">
            <h2>请求记录</h2>
            <div class="toolbar">
                <button class="btn" onclick="refreshRequests()">刷新</button>
            </div>
            <div class="table-container">
                <table id="requestsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户</th>
                            <th>提供商</th>
                            <th>状态</th>
                            <th>耗时</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTableBody">
                        <tr><td colspan="6" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 系统设置 -->
        <div id="settings" class="section">
            <h2>系统设置</h2>
            <div class="card">
                <h3>基本设置</h3>
                <div class="form-group">
                    <label>应用名称:</label>
                    <input type="text" id="appName" value="LingProxy" readonly>
                </div>
                <div class="form-group">
                    <label>版本:</label>
                    <input type="text" id="appVersion" value="1.0.0" readonly>
                </div>
                <div class="form-group">
                    <label>环境:</label>
                    <input type="text" id="appEnv" value="development" readonly>
                </div>
                <button class="btn primary" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
