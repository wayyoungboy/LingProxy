name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      build_platforms:
        description: 'Platforms to build (comma-separated: linux-amd64,linux-arm64,darwin-amd64,windows-amd64,all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-amd64
          - linux-arm64
          - darwin-amd64
          - windows-amd64
      build_docker:
        description: 'Build Docker image'
        required: false
        default: false
        type: boolean
      build_frontend:
        description: 'Build frontend'
        required: false
        default: true
        type: boolean

env:
  BINARY_NAME: lingproxy
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
          - goos: linux
            goarch: arm64
            platform: linux-arm64
          - goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - goos: windows
            goarch: amd64
            platform: windows-amd64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Configure Go proxy
        run: |
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Get dependencies
        run: |
          go mod download
          go mod tidy

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

      - name: Build binary
        if: |
          github.event.inputs.build_platforms == 'all' || 
          contains(github.event.inputs.build_platforms, matrix.platform)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist/${{ matrix.platform }}
          LDFLAGS="-X main.Version=${{ env.VERSION }} -X main.Commit=${{ env.COMMIT }} -X main.BuildTime=${{ env.BUILD_TIME }}"
          go build -ldflags "$LDFLAGS" -o dist/${{ matrix.platform }}/${{ env.BINARY_NAME }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/main.go
          chmod +x dist/${{ matrix.platform }}/${{ env.BINARY_NAME }}${{ matrix.goos == 'windows' && '.exe' || '' }}

      - name: Create archive
        if: |
          github.event.inputs.build_platforms == 'all' || 
          contains(github.event.inputs.build_platforms, matrix.platform)
        run: |
          cd dist/${{ matrix.platform }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ../${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.platform }}.zip ${{ env.BINARY_NAME }}.exe
          else
            tar -czf ../${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.platform }}.tar.gz ${{ env.BINARY_NAME }}
          fi

      - name: Upload artifact
        if: |
          github.event.inputs.build_platforms == 'all' || 
          contains(github.event.inputs.build_platforms, matrix.platform)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.platform }}
          path: |
            dist/${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.platform }}.*
            dist/${{ matrix.platform }}/*

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event.inputs.build_frontend == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event.inputs.build_docker == 'true'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
