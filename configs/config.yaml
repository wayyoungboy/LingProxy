# LingProxy 配置文件

app:
  name: "LingProxy"
  version: "1.0.0"
  environment: "development"
  port: 8080
  host: "0.0.0.0"

storage:
  type: "gorm"
  gorm:
    driver: "sqlite"
    dsn: "lingproxy.db"
    # MySQL 示例（请修改为实际值）
    # driver: "mysql"
    # dsn: "username:password@tcp(localhost:3306)/lingproxy?charset=utf8mb4&parseTime=True&loc=Local"
    # PostgreSQL 示例（请修改为实际值）
    # driver: "postgres"
    # dsn: "host=localhost user=username password=password dbname=lingproxy port=5432 sslmode=disable TimeZone=Asia/Shanghai"

log:
  level: "info"
  format: "json"
  output: "both"  # stdout: 仅控制台, file: 仅文件, both: 同时输出到控制台和文件（推荐，实现持久化）
  file_path: "./logs/lingproxy.log"
  max_size: 100      # 单个日志文件最大大小（MB）
  max_backups: 3     # 保留的备份文件数量
  max_age: 28        # 日志文件保留天数
  compress: true     # 是否压缩旧日志文件

security:
  auth:
    enabled: true  # 是否启用认证，false时所有API（除登录外）都不需要认证
  cors:
    enabled: true
    allow_origins:
      - "*"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allow_headers:
      - "*"

load_balancer:
  default_strategy: "round_robin"

provider:
  timeout: "30s"
  max_retries: 3

admin:
  username: "admin"
  # ⚠️ 请设置强密码！首次启动后建议立即修改
  # password: "YOUR_STRONG_PASSWORD_HERE"
  password: ""  # 留空则不会设置密码，需要通过其他方式设置
  api_key: ""  # 留空则自动生成，首次启动后查看日志获取
  auto_create: true
