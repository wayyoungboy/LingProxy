version: '3.8'

services:
  lingproxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: lingproxy:latest
    container_name: lingproxy
    ports:
      - "80:80"
    environment:
      - GIN_MODE=release
      - TZ=Asia/Shanghai
    volumes:
      # 配置文件目录（挂载配置文件，注意：config.yaml需要手动创建或从example复制）
      - ../backend/configs:/app/configs:ro
      # 日志目录
      - ../logs:/app/logs
      # 数据目录（SQLite数据库等）
      - ../data:/app/data
      # 运行目录（PID文件等）
      - ../run:/app/run
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
