<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingProxy API 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .config-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .config-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .config-row:last-child {
            margin-bottom: 0;
        }

        .config-row label {
            min-width: 120px;
            font-weight: 500;
            color: #495057;
        }

        .config-row input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .config-row input:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s;
            position: relative;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            color: #667eea;
            background: white;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #6c757d;
            font-size: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .result-section h3 {
            margin-bottom: 15px;
            color: #495057;
        }

        .result-content {
            background: white;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .result-content.success {
            border-left: 4px solid #28a745;
        }

        .result-content.error {
            border-left: 4px solid #dc3545;
            color: #dc3545;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        .message-item .role {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .message-item .content {
            color: #495057;
        }

        .add-message-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-message-btn:hover {
            background: #218838;
        }

        .remove-message-btn {
            margin-top: 5px;
            padding: 5px 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .remove-message-btn:hover {
            background: #c82333;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
        }

        .stat-item {
            flex: 1;
        }

        .stat-item label {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .stat-item value {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LingProxy API 测试页面</h1>
            <p>测试对话、文本补全等接口功能</p>
        </div>

        <div class="config-section">
            <div class="config-row">
                <label>API Base URL:</label>
                <input type="text" id="baseUrl" value="http://localhost:8080/llm/v1" placeholder="http://localhost:8080/llm/v1">
            </div>
            <div class="config-row">
                <label>API Key:</label>
                <input type="text" id="apiKey" placeholder="ling-your-api-key-here" value="">
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chat')">💬 对话接口</button>
            <button class="tab" onclick="switchTab('completion')">📝 文本补全</button>
            <button class="tab" onclick="switchTab('models')">📋 模型列表</button>
        </div>

        <!-- 对话接口 -->
        <div id="chat-tab" class="tab-content active">
            <form id="chat-form" onsubmit="testChatCompletion(event)">
                <div class="form-group">
                    <label>模型名称:</label>
                    <input type="text" id="chat-model" value="gpt-3.5-turbo" placeholder="gpt-3.5-turbo">
                    <small>例如: gpt-3.5-turbo, gpt-4, 或其他已配置的模型</small>
                </div>

                <div class="form-group">
                    <label>消息列表:</label>
                    <div id="chat-messages">
                        <div class="message-item">
                            <div class="role">user</div>
                            <textarea class="content" placeholder="输入用户消息...">你好，请介绍一下你自己</textarea>
                            <button type="button" class="remove-message-btn" onclick="removeMessage(this)" style="display: none;">删除</button>
                        </div>
                    </div>
                    <button type="button" class="add-message-btn" onclick="addMessage()">+ 添加消息</button>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="chat-stream">
                        <label for="chat-stream">启用流式响应</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Temperature (0-2):</label>
                    <input type="number" id="chat-temperature" value="0.7" min="0" max="2" step="0.1">
                </div>

                <div class="form-group">
                    <label>Max Tokens:</label>
                    <input type="number" id="chat-max-tokens" value="1000" min="1">
                </div>

                <button type="submit" class="btn btn-primary" id="chat-submit">
                    <span>发送请求</span>
                </button>
            </form>

            <div id="chat-result" class="result-section" style="display: none;">
                <h3>响应结果:</h3>
                <div id="chat-result-content" class="result-content"></div>
                <div id="chat-stats" class="stats" style="display: none;"></div>
            </div>
        </div>

        <!-- 文本补全接口 -->
        <div id="completion-tab" class="tab-content">
            <form id="completion-form" onsubmit="testCompletion(event)">
                <div class="form-group">
                    <label>模型名称:</label>
                    <input type="text" id="completion-model" value="text-davinci-003" placeholder="text-davinci-003">
                    <small>例如: text-davinci-003, text-curie-001 等</small>
                </div>

                <div class="form-group">
                    <label>提示词 (Prompt):</label>
                    <textarea id="completion-prompt" placeholder="输入提示词...">写一首关于春天的诗：</textarea>
                </div>

                <div class="form-group">
                    <label>Temperature (0-2):</label>
                    <input type="number" id="completion-temperature" value="0.7" min="0" max="2" step="0.1">
                </div>

                <div class="form-group">
                    <label>Max Tokens:</label>
                    <input type="number" id="completion-max-tokens" value="500" min="1">
                </div>

                <button type="submit" class="btn btn-primary" id="completion-submit">
                    <span>发送请求</span>
                </button>
            </form>

            <div id="completion-result" class="result-section" style="display: none;">
                <h3>响应结果:</h3>
                <div id="completion-result-content" class="result-content"></div>
                <div id="completion-stats" class="stats" style="display: none;"></div>
            </div>
        </div>

        <!-- 模型列表 -->
        <div id="models-tab" class="tab-content">
            <button type="button" class="btn btn-primary" onclick="loadModels()">
                <span>加载模型列表</span>
            </button>

            <div id="models-result" class="result-section" style="display: none;">
                <h3>可用模型:</h3>
                <div id="models-result-content" class="result-content"></div>
            </div>
        </div>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabName) {
            // 隐藏所有标签页内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // 显示选中的标签页
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // 添加消息
        function addMessage() {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-item';
            messageDiv.innerHTML = `
                <select class="role-select" style="width: 100px; margin-bottom: 5px; padding: 5px;">
                    <option value="user">user</option>
                    <option value="assistant">assistant</option>
                    <option value="system">system</option>
                </select>
                <textarea class="content" placeholder="输入消息内容..."></textarea>
                <button type="button" class="remove-message-btn" onclick="removeMessage(this)">删除</button>
            `;
            messagesDiv.appendChild(messageDiv);
        }

        // 删除消息
        function removeMessage(btn) {
            const messagesDiv = document.getElementById('chat-messages');
            if (messagesDiv.children.length > 1) {
                btn.parentElement.remove();
            }
        }

        // 获取配置
        function getConfig() {
            return {
                baseUrl: document.getElementById('baseUrl').value.trim(),
                apiKey: document.getElementById('apiKey').value.trim()
            };
        }

        // 显示结果
        function showResult(elementId, content, isError = false, stats = null) {
            const resultDiv = document.getElementById(elementId);
            const contentDiv = document.getElementById(elementId + '-content');
            resultDiv.style.display = 'block';
            contentDiv.className = 'result-content' + (isError ? ' error' : ' success');
            contentDiv.textContent = content;

            // 显示统计信息
            if (stats) {
                const statsDiv = document.getElementById(elementId.replace('-result', '-stats'));
                if (statsDiv) {
                    statsDiv.style.display = 'flex';
                    statsDiv.innerHTML = `
                        <div class="stat-item">
                            <label>Prompt Tokens</label>
                            <value>${stats.prompt_tokens || 0}</value>
                        </div>
                        <div class="stat-item">
                            <label>Completion Tokens</label>
                            <value>${stats.completion_tokens || 0}</value>
                        </div>
                        <div class="stat-item">
                            <label>Total Tokens</label>
                            <value>${stats.total_tokens || 0}</value>
                        </div>
                    `;
                }
            }
        }

        // 测试对话接口
        async function testChatCompletion(event) {
            event.preventDefault();
            const config = getConfig();
            const submitBtn = document.getElementById('chat-submit');
            const originalText = submitBtn.innerHTML;

            if (!config.baseUrl || !config.apiKey) {
                alert('请填写 API Base URL 和 API Key');
                return;
            }

            // 收集消息
            const messages = [];
            document.querySelectorAll('#chat-messages .message-item').forEach(item => {
                const roleSelect = item.querySelector('.role-select');
                const role = roleSelect ? roleSelect.value : item.querySelector('.role').textContent.trim();
                const content = item.querySelector('.content').value.trim();
                if (content) {
                    messages.push({ role, content });
                }
            });

            if (messages.length === 0) {
                alert('请至少添加一条消息');
                return;
            }

            // 构建请求
            const requestBody = {
                model: document.getElementById('chat-model').value.trim(),
                messages: messages,
                temperature: parseFloat(document.getElementById('chat-temperature').value),
                max_tokens: parseInt(document.getElementById('chat-max-tokens').value)
            };

            const stream = document.getElementById('chat-stream').checked;
            if (stream) {
                requestBody.stream = true;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 请求中...';

            try {
                const response = await fetch(`${config.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                if (stream) {
                    // 处理流式响应
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let fullContent = '';

                    showResult('chat-result', '正在接收流式响应...\n\n', false);

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') {
                                    continue;
                                }
                                try {
                                    const chunk = JSON.parse(data);
                                    if (chunk.choices && chunk.choices[0] && chunk.choices[0].delta && chunk.choices[0].delta.content) {
                                        fullContent += chunk.choices[0].delta.content;
                                        const resultContent = document.getElementById('chat-result-content');
                                        resultContent.textContent = fullContent;
                                        resultContent.scrollTop = resultContent.scrollHeight;
                                    }
                                } catch (e) {
                                    // 忽略解析错误
                                }
                            }
                        }
                    }

                    showResult('chat-result', fullContent || '未收到内容', false);
                } else {
                    // 处理普通响应
                    const data = await response.json();
                    const content = data.choices && data.choices[0] && data.choices[0].message 
                        ? data.choices[0].message.content 
                        : JSON.stringify(data, null, 2);
                    
                    showResult('chat-result', content, false, data.usage);
                }
            } catch (error) {
                showResult('chat-result', `错误: ${error.message}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        // 测试文本补全接口
        async function testCompletion(event) {
            event.preventDefault();
            const config = getConfig();
            const submitBtn = document.getElementById('completion-submit');
            const originalText = submitBtn.innerHTML;

            if (!config.baseUrl || !config.apiKey) {
                alert('请填写 API Base URL 和 API Key');
                return;
            }

            const requestBody = {
                model: document.getElementById('completion-model').value.trim(),
                prompt: document.getElementById('completion-prompt').value.trim(),
                temperature: parseFloat(document.getElementById('completion-temperature').value),
                max_tokens: parseInt(document.getElementById('completion-max-tokens').value)
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 请求中...';

            try {
                const response = await fetch(`${config.baseUrl}/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const content = data.choices && data.choices[0] && data.choices[0].text 
                    ? data.choices[0].text 
                    : JSON.stringify(data, null, 2);
                
                showResult('completion-result', content, false, data.usage);
            } catch (error) {
                showResult('completion-result', `错误: ${error.message}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        // 加载模型列表
        async function loadModels() {
            const config = getConfig();
            const resultDiv = document.getElementById('models-result');
            const contentDiv = document.getElementById('models-result-content');

            if (!config.baseUrl || !config.apiKey) {
                alert('请填写 API Base URL 和 API Key');
                return;
            }

            resultDiv.style.display = 'block';
            contentDiv.textContent = '加载中...';

            try {
                const response = await fetch(`${config.baseUrl}/models`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${config.apiKey}`
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const models = data.data || data.models || [];
                
                if (models.length === 0) {
                    contentDiv.textContent = '未找到可用模型';
                    return;
                }

                const modelList = models.map(model => {
                    const id = model.id || model;
                    return `• ${id}`;
                }).join('\n');

                contentDiv.textContent = `找到 ${models.length} 个模型:\n\n${modelList}`;
                contentDiv.className = 'result-content success';
            } catch (error) {
                contentDiv.textContent = `错误: ${error.message}`;
                contentDiv.className = 'result-content error';
            }
        }

        // 页面加载时尝试从 localStorage 恢复配置
        window.addEventListener('DOMContentLoaded', () => {
            const savedBaseUrl = localStorage.getItem('lingproxy_base_url');
            const savedApiKey = localStorage.getItem('lingproxy_api_key');
            
            if (savedBaseUrl) {
                document.getElementById('baseUrl').value = savedBaseUrl;
            }
            if (savedApiKey) {
                document.getElementById('apiKey').value = savedApiKey;
            }

            // 保存配置到 localStorage
            document.getElementById('baseUrl').addEventListener('change', (e) => {
                localStorage.setItem('lingproxy_base_url', e.target.value);
            });
            document.getElementById('apiKey').addEventListener('change', (e) => {
                localStorage.setItem('lingproxy_api_key', e.target.value);
            });
        });
    </script>
</body>
</html>
